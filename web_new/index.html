<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeepThisClip - Download Videos from Any URL</title>
    <style>
        :root {
            --bg-color: #0a0a1a;
            --text-color: #ffffff;
            --primary-color: #ff6b6b;
            --secondary-color: #feca57;
            --accent-color: #48dbfb;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --success: #00e676;
            --danger: #ff4b4b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 50px 20px;
            flex: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 18px 24px;
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            padding: 18px 36px;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .quality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 25px;
        }

        .quality-btn {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .quality-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .quality-btn.selected {
            border-color: var(--primary-color);
            background: rgba(255, 107, 107, 0.15);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.2);
        }

        .mode-section {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .mode-btn {
            flex: 1;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .mode-btn.selected {
            border-color: var(--primary-color);
            background: rgba(255, 107, 107, 0.15);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.2);
        }

        .progress-section {
            margin-top: 25px;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.5s ease;
            width: 0%;
            border-radius: 8px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }

        .error {
            color: var(--danger);
            padding: 16px;
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid rgba(255, 75, 75, 0.2);
            border-radius: 14px;
            margin-top: 15px;
            font-weight: 500;
        }

        .success {
            color: var(--success);
            padding: 16px;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.2);
            border-radius: 14px;
            margin-top: 15px;
            font-weight: 500;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .supported-sites {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 25px;
            justify-content: center;
        }

        .site-tag {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .site-tag:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .download-link {
            display: block;
            text-align: center;
            padding: 18px;
            background: linear-gradient(135deg, var(--success), #00c853);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            margin-top: 25px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            transition: all 0.3s ease;
        }

        .download-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 230, 118, 0.4);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .mode-section {
                flex-direction: column;
            }
            
            .quality-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 KeepThisClip</h1>
            <p>Download videos, audio, and files from any URL</p>
        </div>

        <div class="card">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste URL here (YouTube, Instagram, TikTok, Twitter, etc.)">
                <button id="checkBtn" class="btn-primary">
                    <span id="btnText">Check URL</span>
                </button>
            </div>
            <div id="errorMsg" class="error hidden"></div>
        </div>

        <div id="qualitySection" class="card hidden">
            <h3>Select Quality</h3>
            <div id="qualityList" class="quality-grid"></div>
        </div>

        <div id="modeSection" class="card hidden">
            <h3>Download Options</h3>
            <div style="margin-top: 15px;">
                <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7);">Filename (optional)</label>
                <input type="text" id="filenameInput" placeholder="Enter filename with extension">
            </div>
            <div class="mode-section">
                <button class="mode-btn selected" data-mode="direct">Direct Download</button>
                <button class="mode-btn" data-mode="audio">Audio Only</button>
            </div>
            <button id="downloadBtn" class="btn-primary" style="width: 100%; margin-top: 20px;">
                Start Download
            </button>
        </div>

        <div id="progressSection" class="card hidden">
            <h3 id="progressAction">Downloading...</h3>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="progress-info">
                <span id="progressPercent">0%</span>
                <span id="progressSpeed">-- MB/s</span>
            </div>
            <div id="downloadLinkContainer"></div>
        </div>

        <div class="card">
            <h3 style="text-align: center; margin-bottom: 15px;">Supported Sites</h3>
            <div class="supported-sites">
                <span class="site-tag">YouTube</span>
                <span class="site-tag">Instagram</span>
                <span class="site-tag">TikTok</span>
                <span class="site-tag">Twitter/X</span>
                <span class="site-tag">Facebook</span>
                <span class="site-tag">Reddit</span>
                <span class="site-tag">Vimeo</span>
                <span class="site-tag">Twitch</span>
                <span class="site-tag">SoundCloud</span>
                <span class="site-tag">700+ more</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
