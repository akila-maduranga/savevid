version: '3.8'

services:
  # Main Flask application
  app:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: cloud-downloader-app
    restart: unless-stopped
    environment:
      - PORT=8080
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - YOUTUBE_API_URL=http://youtube-api:8001
      - DATABASE_URL=mongodb://mongodb:27017/cloud_downloader
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SECRET_KEY=${SECRET_KEY:-keepthisclip-secret-key-change-in-production}
    volumes:
      - ./DOWNLOADS:/app/DOWNLOADS
    depends_on:
      - mongodb
      - youtube-api
    networks:
      - app-network

  # YouTube API service
  youtube-api:
    build:
      context: ./youtube_api
      dockerfile: Dockerfile
    container_name: cloud-downloader-youtube
    restart: unless-stopped
    environment:
      - PORT=8001
      - YTDLP_PATH=yt-dlp
    volumes:
      - ./youtube_api/downloads:/app/downloads
    networks:
      - app-network

  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: cloud-downloader-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  # Caddy reverse proxy with SSL
  caddy:
    image: caddy:2-alpine
    container_name: cloud-downloader-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
